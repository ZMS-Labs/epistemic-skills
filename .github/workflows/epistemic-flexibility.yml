name: epistemic-flexibility

"on":
  pull_request:
    paths:
      - "plugins/epistemic-skills/skills/**"
      - "plugins/epistemic-skills/contracts/**"
      - "docs/**"
      - ".github/workflows/epistemic-flexibility.yml"
  push:
    branches: [main]
    paths:
      - "plugins/epistemic-skills/skills/**"
      - "plugins/epistemic-skills/contracts/**"
      - "docs/**"
      - ".github/workflows/epistemic-flexibility.yml"

permissions:
  contents: read

jobs:
  stdlib-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Epistemic-flexibility protocol fixtures
        run: python plugins/epistemic-skills/skills/using-epistemic-skills/evals/epistemic-flexibility/run_tests.py
      - name: Behavioral fixture scorer self-test
        run: python plugins/epistemic-skills/skills/using-epistemic-skills/evals/epistemic-flexibility/behavioral/run_tests.py
      - name: Proportionality scorer polarity tests
        run: python plugins/epistemic-skills/skills/using-epistemic-skills/evals/proportionality/run_tests.py
      - name: Blinded proportionality packet tests
        run: python plugins/epistemic-skills/skills/using-epistemic-skills/evals/proportionality/blinded/tests/run_tests.py
      - name: Formal-rigor v2 structural scorer self-test
        run: python plugins/epistemic-skills/skills/applying-formal-rigor/evals/formal-rigor-v2-fixtures/tests/run_tests.py
      - name: Formal-rigor focused proportionality test
        run: python plugins/epistemic-skills/skills/applying-formal-rigor/evals/formal-rigor-v2-fixtures/tests/test_focused.py
      - name: UAT proportionality triage tests
        run: python plugins/epistemic-skills/skills/evidence-locked-uat/evals/triage/tests/run_tests.py
      - name: Decision Ledger proportionality tests
        run: python plugins/epistemic-skills/skills/decision-ledger/evals/proportionality/tests/run_tests.py
      - name: Outsource packet and package integration
        run: python plugins/epistemic-skills/skills/outsource/tests/run_tests.py
      - name: Continuity resume-fixture committed results
        run: |
          score=plugins/epistemic-skills/skills/continuity-verify/evals/resume-fixtures/score.py
          results=plugins/epistemic-skills/skills/continuity-verify/evals/resume-fixtures/results
          expect_pass() {
            python "$score" --results-dir "$1"
          }
          expect_fail() {
            if python "$score" --results-dir "$1"; then
              echo "expected scorer failure for $1" >&2
              exit 1
            fi
          }
          expect_pass "$results/skilled/run-1"
          expect_pass "$results/skilled/run-2"
          expect_pass "$results/skilled/run-3"
          expect_fail "$results/baseline/run-1"
          expect_pass "$results/baseline/run-2"
          expect_fail "$results/baseline/run-3"
          expect_fail "$results/parody/run-1"
      - name: DCO policy unit tests
        run: python .github/scripts/test_check_dco.py
      - name: Compile new Python
        run: |
          python -m py_compile \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/epistemic-flexibility/validate_trace.py \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/epistemic-flexibility/run_tests.py \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/epistemic-flexibility/behavioral/score_behavior.py \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/epistemic-flexibility/behavioral/run_tests.py \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/proportionality/score.py \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/proportionality/run_tests.py \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/proportionality/blinded/runner.py \
            plugins/epistemic-skills/skills/using-epistemic-skills/evals/proportionality/blinded/tests/run_tests.py \
            plugins/epistemic-skills/skills/applying-formal-rigor/evals/formal-rigor-v2-fixtures/score.py \
            plugins/epistemic-skills/skills/applying-formal-rigor/evals/formal-rigor-v2-fixtures/tests/run_tests.py \
            plugins/epistemic-skills/skills/applying-formal-rigor/evals/formal-rigor-v2-fixtures/tests/test_focused.py \
            plugins/epistemic-skills/skills/evidence-locked-uat/evals/triage/score.py \
            plugins/epistemic-skills/skills/evidence-locked-uat/evals/triage/tests/run_tests.py \
            plugins/epistemic-skills/skills/decision-ledger/evals/proportionality/score.py \
            plugins/epistemic-skills/skills/decision-ledger/evals/proportionality/tests/run_tests.py \
            plugins/epistemic-skills/skills/decision-ledger/reference/validate_examples.py
      - name: Parse committed JSON in integration surfaces
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          roots = [
              Path("plugins/epistemic-skills/skills/using-epistemic-skills/evals/epistemic-flexibility"),
              Path("plugins/epistemic-skills/skills/using-epistemic-skills/evals/proportionality"),
              Path("plugins/epistemic-skills/skills/applying-formal-rigor/evals/formal-rigor-v2-fixtures"),
              Path("plugins/epistemic-skills/skills/evidence-locked-uat/evals/triage"),
              Path("plugins/epistemic-skills/skills/decision-ledger/evals/proportionality"),
              Path("plugins/epistemic-skills/skills/decision-ledger/reference"),
          ]
          files = []
          for root in roots:
              files.extend(root.rglob("*.json"))
          for path in files:
              json.loads(path.read_text(encoding="utf-8"))
          print(f"parsed {len(files)} JSON files")
          PY
      - name: Decision-ledger recurrent-correction examples
        run: python plugins/epistemic-skills/skills/decision-ledger/reference/validate_examples.py
      - name: Existing receipt verifier
        run: python plugins/epistemic-skills/contracts/verify_receipt.py --self-test
      - name: Existing UAT judge
        run: python plugins/epistemic-skills/skills/evidence-locked-uat/scripts/judge.py --self-test
      - name: Existing gauntlet tests
        run: python plugins/epistemic-skills/skills/gauntlet/tests/run_tests.py
