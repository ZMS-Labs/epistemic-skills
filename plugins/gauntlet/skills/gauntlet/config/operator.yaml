# DeepReason engine config for the gauntlet's deep mode.
# API keys are read from named environment variables — never stored here.
# Set at least one key in your user environment before using deep mode:
#   OPENAI_API_KEY, DEEPSEEK_API_KEY, or another provider you route below.

FLOOR: 1
K: 4
INTEGRATION_BUDGET_SHARE: 0.30
HV_K: 8
PRECEDENT_K: 4
TRIAL_PARAPHRASE_N: 2
AUDIT_PERIOD: 30
USER_RULINGS_BUDGET: 2
HOLDOUT_SHARE: 0.2
N_SCHOOLS: 4
XEXAM_SHARE: 0.15
VS_K: 6
PARETO_AXES: [hv, reach, coverage]
CAPTURE_W: 20
ATTACK_ENTROPY_FLOOR: 0.2
CRIT_DEBT_CEILING: 0.5
MIN_ATTACKS_FOR_RITUAL: 5
RESEARCH_PERIOD: 5
PACK_TOKEN_BUDGET: 2500
RETRY_MAX: 2

roles:
  conjecturer:
    endpoint: "https://api.openai.com/v1"
    model: gpt-4.1
    temperature: 1.0
    api_key_env: OPENAI_API_KEY
    reasoning: none
    max_tokens: 4000
    json_mode: true
  argumentative_critic:
    endpoint: "https://api.openai.com/v1"
    model: gpt-4.1
    temperature: 0.7
    api_key_env: OPENAI_API_KEY
    reasoning: none
    max_tokens: 3000
    json_mode: true
  defender:
    endpoint: "https://api.openai.com/v1"
    model: gpt-4.1
    temperature: 0.7
    api_key_env: OPENAI_API_KEY
    reasoning: none
    max_tokens: 3000
    json_mode: true
  variator:
    endpoint: "https://api.openai.com/v1"
    model: gpt-4.1
    temperature: 1.0
    api_key_env: OPENAI_API_KEY
    reasoning: none
    max_tokens: 3000
    json_mode: true
  judge:
    - endpoint: "https://api.openai.com/v1"
      model: gpt-4.1
      temperature: 0.0
      api_key_env: OPENAI_API_KEY
      reasoning: none
      max_tokens: 1200
      json_mode: true
    - endpoint: "https://api.deepseek.com"
      model: deepseek-chat
      temperature: 0.0
      api_key_env: DEEPSEEK_API_KEY
      reasoning: none
      max_tokens: 1200
      json_mode: true
  summarizer:
    endpoint: "https://api.openai.com/v1"
    model: gpt-4.1
    temperature: 0.3
    api_key_env: OPENAI_API_KEY
    reasoning: none
    max_tokens: 2000
    json_mode: true
  synthesizer:
    endpoint: "https://api.openai.com/v1"
    model: gpt-4.1
    temperature: 0.9
    api_key_env: OPENAI_API_KEY
    reasoning: none
    max_tokens: 4000
    json_mode: true
  embedder:
    endpoint: "https://api.openai.com/v1"
    model: text-embedding-3-small
    api_key_env: OPENAI_API_KEY
